# ==========================================
# 1. SITE IDENTITY
# ==========================================
title: "Hwang Yunseo | My TIL for InspireCamp"
description: "Daily documentation of theory and engineering practice"
theme: minima

# ==========================================
# 2. FOLDER & CONTENT RULES
# ==========================================
# This section ensures Jekyll processes your subfolders within _posts
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:title/

# ==========================================
# 3. FILE INCLUSION (The "Code" Rule)
# ==========================================
# This rule forces Jekyll to include your Practice files and Images
# as static assets without attempting to parse them as text.
include:
  - "_posts/**/*.py"
  - "_posts/**/*.sql"
  - "_posts/**/*.png"
  - "_posts/**/*.jpg"
  - "_posts/**/*.yaml"